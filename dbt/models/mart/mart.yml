version: 2

models:
  - name: mart_carrier_monthly
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - carrier_code
            - month_start
    columns:
      - name: month_start
        tests:
          - not_null
      - name: carrier_code
        tests:
          - not_null
      - name: total_flights
        tests:
          - not_null

  - name: mart_routes
    columns:
      - name: route_code
        tests:
          - not_null
      - name: total_flights
        tests:
          - not_null