id: ingest_lookups
namespace: flights

tasks:
  - id: download_airports
    type: io.kestra.plugin.scripts.python.Script
    containerImage: python:3.11-slim
    script: |
      import requests, pandas as pd
      url = "https://transtats.bts.gov/Download_Lookup.asp?UserTableName=L_AIRPORT_ID"
      df = pd.read_csv(url)
      df.to_parquet("/tmp/airports.parquet", index=False)

  - id: upload_airports_gcs
    type: io.kestra.plugin.gcp.gcs.Upload
    from: /tmp/airports.parquet
    to: gs://{{ vars.bucket }}/raw/lookups/airports.parquet
    serviceAccount: "{{ secret('GCP_CREDS') }}"

  - id: load_airports_bq
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    projectId: "{{ vars.project_id }}"
    dataset: flights_raw
    table: raw_airports
    from: gs://{{ vars.bucket }}/raw/lookups/airports.parquet
    format: PARQUET
    writeDisposition: WRITE_TRUNCATE
    serviceAccount: "{{ secret('GCP_CREDS') }}"

  - id: download_carriers
    type: io.kestra.plugin.scripts.python.Script
    containerImage: python:3.11-slim
    script: |
      import requests, pandas as pd
      url = "https://transtats.bts.gov/Download_Lookup.asp?UserTableName=L_UNIQUE_CARRIERS"
      df = pd.read_csv(url)
      df.to_parquet("/tmp/carriers.parquet", index=False)

  - id: upload_carriers_gcs
    type: io.kestra.plugin.gcp.gcs.Upload
    from: /tmp/carriers.parquet
    to: gs://{{ vars.bucket }}/raw/lookups/carriers.parquet
    serviceAccount: "{{ secret('GCP_CREDS') }}"

  - id: load_carriers_bq
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    projectId: "{{ vars.project_id }}"
    dataset: flights_raw
    table: raw_carriers
    from: gs://{{ vars.bucket }}/raw/lookups/carriers.parquet
    format: PARQUET
    writeDisposition: WRITE_TRUNCATE
    serviceAccount: "{{ secret('GCP_CREDS') }}"